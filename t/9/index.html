<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
<title>T9 — Full reading panel replica</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #faf8f0; --fg: #2c2c2c; --bg-secondary: #f0ede4; --border: #d4d0c8; --accent: #8b4513; --font-size: 24px; --line-height: 1.4; --column-gap: 40px; }
[data-theme="dark"] { --bg: #1a1a2e; --fg: #e0dcc8; --bg-secondary: #16213e; --border: #333; --accent: #d4a574; }
[data-theme="sepia"] { --bg: #f4ecd8; --fg: #5b4636; --bg-secondary: #e8dcc8; --border: #c8b898; --accent: #8b6914; }

html, body { height: 100%; background: var(--bg); color: var(--fg); font-family: 'Noto Serif TC', serif; }

/* Scroll wrapper for browser chrome hiding */
#scroll-wrapper {
  width: 100%;
  height: calc(100% + 1px);
  overflow-y: scroll;
  -webkit-overflow-scrolling: touch;
}
#scroll-content { min-height: calc(100% + 2px); }

/* Toolbar */
.toolbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 48px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 12px;
  z-index: 50;
  transition: transform 0.25s ease, opacity 0.25s ease;
}
.toolbar button { background: none; border: none; font-size: 1.2rem; cursor: pointer; padding: 4px 8px; color: var(--fg); border-radius: 4px; }
.toolbar button:hover { background: var(--border); }
.toolbar-title { flex: 1; font-size: 1rem; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: center; }
.toolbar-info { font-size: 0.85rem; opacity: 0.7; white-space: nowrap; }

/* Nav bar */
.nav-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 44px;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 12px;
  z-index: 50;
  transition: transform 0.25s ease, opacity 0.25s ease;
}
.nav-btn { background: none; border: none; font-size: 1rem; cursor: pointer; padding: 4px 8px; color: var(--fg); }
#page-slider { flex: 1; direction: rtl; }

/* TTS bar */
.tts-bar {
  position: fixed;
  bottom: 44px; left: 0; right: 0;
  height: 44px;
  background: var(--accent);
  color: #fff;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 16px;
  z-index: 50;
  transition: transform 0.25s ease;
}
.tts-bar.hidden { transform: translateY(100%); }
.tts-bar button { background: none; border: none; color: #fff; font-size: 1.1rem; cursor: pointer; padding: 4px 8px; }
#tts-status { flex: 1; font-size: 0.85rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Reader container */
#reader-container {
  position: fixed;
  top: 48px; bottom: 88px; left: 0; right: 0;
  overflow: hidden;
  transition: top 0.25s ease, bottom 0.25s ease;
}

/* Reader */
.reader {
  width: 100%;
  height: 100%;
  padding: 24px 40px;
  writing-mode: vertical-rl;
  overflow-x: scroll;
  overflow-y: hidden;
  touch-action: pan-y;
  font-size: var(--font-size);
  line-height: var(--line-height);
  font-family: 'Noto Serif TC', serif;
  column-gap: var(--column-gap);
  white-space: pre-wrap;
  word-break: break-all;
}
.reader .chapter-heading { font-size: 1.3em; font-weight: bold; color: var(--accent); margin-bottom: 1em; }

/* Reading mode (immersive) */
.reading-mode .toolbar,
.reading-mode .nav-bar,
.reading-mode .tts-bar {
  transform: translateY(0);
  transition: opacity 0.25s ease, visibility 0.25s ease;
  opacity: 0; visibility: hidden; pointer-events: none;
}
.reading-mode .toolbar { transform: translateY(-100%); }
.reading-mode .nav-bar, .reading-mode .tts-bar { transform: translateY(100%); }
.reading-mode.chrome-visible .toolbar,
.reading-mode.chrome-visible .nav-bar {
  opacity: 1; visibility: visible; pointer-events: auto; transform: translateY(0);
}
.reading-mode #reader-container { top: 0; bottom: 0; }
.reading-mode.chrome-visible #reader-container { top: 0; bottom: 0; }

/* Settings overlay */
#settings-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 90;
  display: none;
}
#settings-overlay.active { display: flex; align-items: center; justify-content: center; }
#settings-box {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  width: 90%;
  max-width: 360px;
}
#settings-box h3 { margin-bottom: 12px; color: var(--accent); }
#settings-box label { display: block; margin-bottom: 8px; font-size: 0.9rem; }
#settings-box select, #settings-box input[type="range"] { width: 100%; margin-top: 4px; }

/* Info badge */
.info { position: fixed; top: 0; right: 0; background: rgba(0,0,0,0.7); color: #fff; padding: 4px 10px; font-size: 12px; z-index: 99; writing-mode: horizontal-tb; }

/* Mobile */
@media (max-width: 600px) {
  .reader { padding: 16px 20px; }
  .toolbar { padding: 0 8px; }
  .toolbar-title { font-size: 0.85rem; }
}
</style>
</head>
<body>
<div class="info">T9: Full reading panel — themes, font size, chrome toggle, nav, TTS bar</div>

<!-- Scroll wrapper for browser chrome hiding -->
<div id="scroll-wrapper"><div id="scroll-content"></div></div>

<!-- Toolbar -->
<div id="toolbar" class="toolbar">
  <button id="btn-settings" title="Settings">⚙</button>
  <button id="btn-back" title="Back">☰</button>
  <span id="book-title" class="toolbar-title">測試書籍 — 千字文</span>
  <span id="page-info" class="toolbar-info">1 / ?</span>
  <button id="btn-fullscreen" title="Fullscreen">⛶</button>
</div>

<!-- Reader -->
<div id="reader-container">
  <div id="reader" class="reader"></div>
</div>

<!-- TTS bar -->
<div id="tts-bar" class="tts-bar hidden">
  <button id="tts-play">▶</button>
  <button id="tts-stop">⏹</button>
  <span id="tts-status">TTS ready</span>
</div>

<!-- Nav bar -->
<div id="nav-bar" class="nav-bar">
  <button id="nav-prev" class="nav-btn" title="Previous">◀</button>
  <input id="page-slider" type="range" min="0" max="100" value="0">
  <button id="nav-next" class="nav-btn" title="Next">▶</button>
  <button id="btn-tts" title="TTS">🔊</button>
</div>

<!-- Settings overlay -->
<div id="settings-overlay">
  <div id="settings-box">
    <h3>設定</h3>
    <label>
      主題 Theme
      <select id="theme-select">
        <option value="light">淺色 Light</option>
        <option value="dark">深色 Dark</option>
        <option value="sepia">復古 Sepia</option>
      </select>
    </label>
    <label>
      字體大小 Font Size: <span id="font-size-label">24px</span>
      <input id="font-size" type="range" min="16" max="48" value="24" step="2">
    </label>
    <button id="close-settings" style="margin-top:12px;padding:8px 16px;background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer;">關閉</button>
  </div>
</div>

<script>
// --- Content ---
const phrases = [
  '天地玄黃，宇宙洪荒。日月盈昃，辰宿列張。',
  '寒來暑往，秋收冬藏。閏餘成歲，律呂調陽。',
  '雲騰致雨，露結為霜。金生麗水，玉出崑岡。',
  '劍號巨闕，珠稱夜光。果珍李柰，菜重芥薑。',
  '海鹹河淡，鱗潛羽翔。龍師火帝，鳥官人皇。',
  '始制文字，乃服衣裳。推位讓國，有虞陶唐。',
  '弔民伐罪，周發殷湯。坐朝問道，垂拱平章。',
  '愛育黎首，臣伏戎羌。遐邇一體，率賓歸王。',
  '鳴鳳在竹，白駒食場。化被草木，賴及萬方。',
  '蓋此身髮，四大五常。恭惟鞠養，豈敢毀傷。',
];
let text = '';
for (let i = 0; i < 400; i++) text += phrases[i % phrases.length] + '\n';

const reader = document.getElementById('reader');
reader.textContent = text;

// --- Page info ---
function updatePageInfo() {
  const pw = reader.clientWidth;
  const total = Math.ceil(reader.scrollWidth / pw);
  const cur = Math.floor(Math.abs(reader.scrollLeft) / pw) + 1;
  document.getElementById('page-info').textContent = cur + ' / ' + total;
  document.getElementById('page-slider').max = total;
  document.getElementById('page-slider').value = total - cur + 1; // RTL slider
}
reader.addEventListener('scroll', updatePageInfo);
setTimeout(updatePageInfo, 100);

// --- Navigation ---
document.getElementById('nav-prev').addEventListener('click', () => {
  reader.scrollBy({ left: reader.clientWidth, behavior: 'smooth' });
});
document.getElementById('nav-next').addEventListener('click', () => {
  reader.scrollBy({ left: -reader.clientWidth, behavior: 'smooth' });
});
document.getElementById('page-slider').addEventListener('input', (e) => {
  const total = Math.ceil(reader.scrollWidth / reader.clientWidth);
  const page = total - parseInt(e.target.value) + 1;
  reader.scrollLeft = -((page - 1) * reader.clientWidth);
});

// --- Immersive mode ---
let chromeTimer;
function toggleChrome() {
  const body = document.body;
  if (!body.classList.contains('reading-mode')) {
    body.classList.add('reading-mode');
  } else if (body.classList.contains('chrome-visible')) {
    body.classList.remove('chrome-visible');
    clearTimeout(chromeTimer);
  } else {
    body.classList.add('chrome-visible');
    chromeTimer = setTimeout(() => body.classList.remove('chrome-visible'), 4000);
  }
}
reader.addEventListener('click', (e) => {
  const rect = reader.getBoundingClientRect();
  const cx = (e.clientX - rect.left) / rect.width;
  const cy = (e.clientY - rect.top) / rect.height;
  if (cx > 0.3 && cx < 0.7 && cy > 0.3 && cy < 0.7) {
    toggleChrome();
  }
});

// --- Theme ---
document.getElementById('theme-select').addEventListener('change', (e) => {
  document.documentElement.setAttribute('data-theme', e.target.value);
});

// --- Font size ---
document.getElementById('font-size').addEventListener('input', (e) => {
  const v = e.target.value + 'px';
  document.documentElement.style.setProperty('--font-size', v);
  document.getElementById('font-size-label').textContent = v;
});

// --- Settings ---
document.getElementById('btn-settings').addEventListener('click', () => {
  document.getElementById('settings-overlay').classList.add('active');
});
document.getElementById('close-settings').addEventListener('click', () => {
  document.getElementById('settings-overlay').classList.remove('active');
});
document.getElementById('settings-overlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('active');
});

// --- Fullscreen ---
document.getElementById('btn-fullscreen').addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen();
  }
});

// --- TTS toggle ---
document.getElementById('btn-tts').addEventListener('click', () => {
  document.getElementById('tts-bar').classList.toggle('hidden');
  updatePageInfo(); // recalc since bottom offset changes
});

// --- Keyboard ---
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'PageUp') {
    reader.scrollBy({ left: reader.clientWidth, behavior: 'smooth' });
  } else if (e.key === 'ArrowLeft' || e.key === 'PageDown') {
    reader.scrollBy({ left: -reader.clientWidth, behavior: 'smooth' });
  }
});
</script>
</body>
</html>
