<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T1 — Basic vertical scroll</title>
<style>
body {
  margin: 0;
  padding: 20px;
  font-family: serif;
  font-size: 20px;
  line-height: 1.8;
  background: #faf8f0;
  color: #2c2c2c;
}
h1 { font-size: 1.2rem; margin-bottom: 1rem; color: #8b4513; }
.info { position: fixed; top: 0; right: 0; background: rgba(0,0,0,0.7); color: #fff; padding: 4px 10px; font-size: 12px; z-index: 99; }
</style>
</head>
<body>
<div class="info">T1: Basic vertical scroll (LTR, normal flow)</div>
<h1>Test 1 — 基本垂直捲動</h1>
<p>This is the simplest case: normal document flow, vertical (Y) scroll. Mobile browsers should hide the address bar when scrolling down.</p>
<script>
// Generate lots of Chinese text content
const phrases = [
  '天地玄黃，宇宙洪荒。日月盈昃，辰宿列張。',
  '寒來暑往，秋收冬藏。閏餘成歲，律呂調陽。',
  '雲騰致雨，露結為霜。金生麗水，玉出崑岡。',
  '劍號巨闕，珠稱夜光。果珍李柰，菜重芥薑。',
  '海鹹河淡，鱗潛羽翔。龍師火帝，鳥官人皇。',
  '始制文字，乃服衣裳。推位讓國，有虞陶唐。',
  '弔民伐罪，周發殷湯。坐朝問道，垂拱平章。',
  '愛育黎首，臣伏戎羌。遐邇一體，率賓歸王。',
];
let html = '';
for (let i = 0; i < 200; i++) {
  html += '<p>' + (i + 1) + '. ' + phrases[i % phrases.length] + '</p>\n';
}
document.body.insertAdjacentHTML('beforeend', html);
</script>
</body>
</html>
